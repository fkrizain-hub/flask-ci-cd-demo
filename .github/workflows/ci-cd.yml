name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Aplikasi
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout kode
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Jalankan unit test
      run: |
        pytest test_app.py -v
    -name: Run Trivity vulnerability scanner
     uses: aquasecurity/trivy-action@master
     with:
       scan-type: 'fs'
       scan-ref: '.'
       format: 'table'
       exit-code: '0'
       severity: 'CRITICAL,HIGH'
  build-and-push:
    name: Build & Push ke Docker Hub
    runs-on: ubuntu-latest
    needs: test  # hanya jalan kalau test sukses
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Checkout kode
      uses: actions/checkout@v4
      
    - name: Login ke Docker Hub
      uses: docker/login-action@v3
      with:
        username: fikriizain
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build dan Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
           fikriizain/flask-cicd-demo:latest
           fikriizain/flask-cicd-demo:${{ github.ref_name}}
  notify:
    needs: [test, build-and-push]

    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "CI/CD Pipeline Update"
          description: "Repository: ${{ github.repository }} | Branch: ${{ github.ref_name }}"
